{% extends "user/user_base.html" %}
{% block title %}Checkout{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/checkout.css') }}">

<div class="checkout-wrapper">

  <!-- LEFT: ORDER SUMMARY -->
  <div class="checkout-card">
    <h2>Order Summary</h2>

    <table class="summary-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Qty</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        {% for item in cart_items %}
        <tr>
          <td>{{ item.NAME }}</td>
          <td>{{ item.QUANTITY }}</td>
          <td>₹{{ item.TOTAL_PRICE }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <div class="grand-total">
      Grand Total: <span>₹{{ total_amount }}</span>
    </div>
  </div>

  <!-- RIGHT: SHIPPING ADDRESS -->
  <div class="checkout-card">
    <h2>Shipping Address</h2>

    <!-- ❌ NO action, NO submit -->
    <form id="checkout-form">
      <!-- ✅ Payment Method Selection -->
      <div class="payment-option">
          <label>
              <input type="radio" name="payment_method" value="online" checked>
              💳 Pay Online
          </label>
      </div>

      <div class="payment-option">
          <label>
              <input type="radio" name="payment_method" value="cod">
              🚚 Cash On Delivery
          </label>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="fullname" required>
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" required>
        </div>
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea name="address" required></textarea>
      </div>

      <div class="row">
        <div class="form-group">
          <label>City</label>
          <input type="text" name="city" required>
        </div>

        <div class="form-group">
          <label>Pincode</label>
          <input type="text" name="pincode" required>
        </div>
      </div>

      <!-- ✅ Razorpay Button -->
      <button type="button" id="rzp-button" class="place-order-btn">
        💳 Pay & Place Order
      </button>

    </form>
  </div>

</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
document.getElementById("rzp-button").onclick = async function () {

    const button = this;
    const form = document.getElementById("checkout-form");

    // ✅ Prevent double click
    button.disabled = true;

    try {

        // ✅ Validate form first
        if (!form.checkValidity()) {
            form.reportValidity();
            button.disabled = false;
            return;
        }

        const formData = new FormData(form);
        const addressData = Object.fromEntries(formData.entries());

        const paymentMethod = formData.get("payment_method");
        const amount = {{ total_amount }};

        // ================================
        // 🚚 COD FLOW
        // ================================
        if (paymentMethod === "cod") {

            const codResponse = await fetch("/place-cod-order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(addressData)
            });

            const result = await codResponse.json();

            if (result.status === "success") {
                alert("🎉 Order placed successfully (Cash on Delivery)!");
                window.location.href = "/user";
            } else {
                alert("❌ COD Order failed");
                button.disabled = false;
            }

            return;
        }

        // ================================
        // 💳 ONLINE PAYMENT FLOW
        // ================================

        const response = await fetch("/create-razorpay-order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ amount: amount })
        });

        const data = await response.json();

        if (!data.order_id) {
            alert("❌ Failed to create payment order");
            button.disabled = false;
            return;
        }

        const options = {
            key: data.key,
            amount: data.amount,
            currency: "INR",
            name: "MyShop",
            description: "Order Payment",
            order_id: data.order_id,

            handler: async function (response) {

                try {

                    const verifyRes = await fetch("/verify-payment", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_signature: response.razorpay_signature,
                            address: addressData
                        })
                    });

                    const result = await verifyRes.json();

                    if (result.status === "success") {
                        alert("🎉 Payment Successful! Order placed.");
                        window.location.href = "/user";
                    } else {
                        alert("❌ Payment verification failed");
                        button.disabled = false;
                    }

                } catch (err) {
                    console.error("Verification Error:", err);
                    alert("❌ Payment verification error");
                    button.disabled = false;
                }
            },

            modal: {
                ondismiss: function () {
                    // 🔁 Re-enable button if user closes Razorpay popup
                    button.disabled = false;
                }
            },

            theme: {
                color: "#3399cc"
            }
        };

        const rzp = new Razorpay(options);
        rzp.open();

    } catch (error) {
        console.error("Checkout Error:", error);
        alert("❌ Something went wrong. Please try again.");
        button.disabled = false;
    }
};
</script>

{% endblock %}
