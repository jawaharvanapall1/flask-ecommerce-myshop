{% extends "user/user_base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="profile-layout"><!-- profile-layout -->
        <!-- PROFILE CONTENT -->
        <div class="profile-content">

            <!-- PERSONAL INFORMATION -->
            <div class="profile-section" data-section="personal">
                <div class="section-header">
                    <h3>Personal Information</h3>
                    <a href="#" class="edit-link">Edit</a>
                </div>

                <div class="name-row">
                    <input type="text" value="{{ first_name }}" disabled>
                    <input type="text" value="{{ last_name }}" disabled>
                </div>

                <div class="gender-section">
                    <label>Your Gender</label>
                    <div class="gender-options">
                        <label>
                            <input type="radio" name="gender"
                                   {% if user.GENDER == 'male' %}checked{% endif %}
                                   disabled> Male
                        </label>
                        <label>
                            <input type="radio" name="gender"
                                   {% if user.GENDER == 'female' %}checked{% endif %}
                                   disabled> Female
                        </label>
                    </div>
                </div>
            </div>

            <!-- EMAIL -->
            <div class="profile-section" data-section="email">
                <div class="section-header">
                    <h3>Email Address</h3>
                    <a href="#" class="edit-link">Edit</a>
                </div>
                <input type="email" value="{{ user.EMAIL }}" disabled>
            </div>

            <!-- MOBILE -->
            <div class="profile-section" data-section="mobile">
                <div class="section-header">
                    <h3>Mobile Number</h3>
                    <a href="#" class="edit-link">Edit</a>
                </div>
                <input type="text" value="{{ user.PHONE_NUMBER }}" disabled>
            </div>

        </div> <!-- profile-content -->
    </div> <!-- profile-layout -->
</div>

{% endblock %}
