<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        /* Layout */
        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 230px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 20px;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .sidebar a:hover {
            background-color: #1abc9c;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 20px;
        }

        /* Info Center */
        .info-center {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .info-card h3 {
            margin: 0;
            font-size: 18px;
            color: #555;
        }

        .info-card p {
            font-size: 28px;
            margin: 10px 0 0;
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Admin Panel</h2>

        <a href="{{ url_for('products') }}">📦 Products</a>
        <a href="{{ url_for('addproduct') }}">➕ Add Product</a>
        <a href="{{ url_for('orders') }}">🧾 Orders</a>
        <a href="{{ url_for('adminusers') }}">Users</a>
        <a href="{{ url_for('profile') }}">👤 Profile</a>
        <a href="{{ url_for('adminlogout') }}">🚪 Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <h2>Dashboard</h2>

        <!-- INFO CENTER -->
        <div class="info-center">
            <div class="info-card">
                <h3>Total Products</h3>
                <p>{{ total_products }}</p>
            </div>

            <div class="info-card">
                <h3>Total Orders</h3>
                <p>{{ total_orders }}</p>
            </div>

            <div class="info-card">
                <h3>Pending Orders</h3>
                <p>{{ pending_orders }}</p>
            </div>

            <div class="info-card">
                <h3>Total Users</h3>
                <p>{{ total_users }}</p>
            </div>
        </div>

        <!-- PAGE CONTENT GOES HERE -->
        <p>Welcome to the Admin Dashboard 👋</p>

    </div>
</div>

</body>
</html>
