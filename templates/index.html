<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce | Welcome</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .landing-card {
            background-color: white;
            color: #333;
            padding: 40px;
            width: 420px;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .landing-card h2 {
            margin-bottom: 10px;
            font-size: 26px;
        }

        .landing-card h2 span {
            color: #667eea;
        }

        .landing-card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #5563d6;
        }

        .btn-secondary {
            background-color: #6c757d;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }

        .register-link {
            margin-top: 20px;
            font-size: 14px;
        }

        .register-link a {
            color: #667eea;
            font-weight: bold;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="landing-card">

    <h2>Welcome to <span>Ecommerce</span></h2>
    <p>Your one-stop shop for everything you need</p>

    <a href="{{ url_for('login') }}" class="btn">Login</a>

    <a href="{{ url_for('register') }}" class="btn btn-secondary">
        Register
    </a>

    

</div>

</body>
</html>
